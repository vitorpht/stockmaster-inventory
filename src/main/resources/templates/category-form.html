<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Category')}"></head>
<body>
	<div th:replace="~{fragments/layout :: navbar(activePage='categories')}"></div>

	<div class="container">
		<h1 class="mb-4">New Category</h1>

		<form th:action="@{/categories}" th:object="${category}" method="post" class="col-md-6">
			<div class="mb-3">
				<label for="name" class="form-label">Name</label>
				<input type="text" id="name" class="form-control" th:field="*{name}"
					th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
				<div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
			</div>

			<div class="d-flex gap-2">
				<button type="submit" class="btn btn-primary">Save</button>
				<a th:href="@{/categories}" class="btn btn-secondary">Cancel</a>
			</div>
		</form>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
