<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Product')}"></head>
<body>
	<div th:replace="~{fragments/layout :: navbar(activePage='products')}"></div>

	<div class="container">
		<h1 class="mb-4">New Product</h1>

		<form th:action="@{/products}" th:object="${product}" method="post" class="col-md-6">
			<div class="mb-3">
				<label for="name" class="form-label">Name</label>
				<input type="text" id="name" class="form-control" th:field="*{name}"
					th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
				<div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
			</div>

			<div class="mb-3">
				<label for="description" class="form-label">Description</label>
				<textarea id="description" class="form-control" rows="3" th:field="*{description}"></textarea>
			</div>

			<div class="mb-3">
				<label for="price" class="form-label">Price</label>
				<input type="number" id="price" class="form-control" step="0.01" min="0.01" th:field="*{price}"
					th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
				<div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
			</div>

			<div class="mb-3">
				<label for="quantity" class="form-label">Quantity</label>
				<input type="number" id="quantity" class="form-control" min="0" th:field="*{quantity}"
					th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
				<div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
			</div>

			<div class="mb-3">
				<label for="category" class="form-label">Category</label>
				<select id="category" class="form-select" th:field="*{category.id}" required
					th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
					<option value="">Select a category</option>
					<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
				</select>
				<div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
			</div>

			<div class="d-flex gap-2">
				<button type="submit" class="btn btn-primary">Save</button>
				<a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
			</div>
		</form>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
