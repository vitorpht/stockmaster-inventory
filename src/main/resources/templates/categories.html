<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
	<div th:replace="~{fragments/layout :: navbar(activePage='categories')}"></div>

	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 class="mb-0">Categories</h1>
			<a th:href="@{/categories/new}" class="btn btn-primary">Add Category</a>
		</div>

		<div class="table-responsive">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Name</th>
						<th>Created At</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="category : ${categories}">
						<td th:text="${category.id}"></td>
						<td th:text="${category.name}"></td>
						<td th:text="${#temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(categories)}">
						<td colspan="3" class="text-center text-muted">No categories found.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
