<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head (title)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title} + ' - StockMaster'">StockMaster</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	<nav th:fragment="navbar (activePage)" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
		<div class="container">
			<a class="navbar-brand" th:href="@{/}">StockMaster</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">Dashboard</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/categories}" th:classappend="${activePage == 'categories'} ? ' active' : ''">Categories</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/products}" th:classappend="${activePage == 'products'} ? ' active' : ''">Products</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/stock}" th:classappend="${activePage == 'stock'} ? ' active' : ''">Stock</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
