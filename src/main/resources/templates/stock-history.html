<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Movement History')}"></head>
<body>
	<div th:replace="~{fragments/layout :: navbar(activePage='stock')}"></div>

	<div class="container">
		<h1 class="mb-4">Movement History</h1>

		<div class="card mb-4 col-md-6">
			<div class="card-body">
				<h5 class="card-title" th:text="${product.name}">Product</h5>
				<p class="card-text mb-0">
					<strong>Current Stock:</strong> <span th:text="${product.quantity}"></span>
				</p>
			</div>
		</div>

		<div class="table-responsive">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Type</th>
						<th>Quantity</th>
						<th>Created At</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="movement : ${movements}">
						<td th:text="${movement.id}"></td>
						<td>
							<span th:if="${movement.type.name() == 'ENTRY'}" class="badge bg-success">ENTRY</span>
							<span th:if="${movement.type.name() == 'EXIT'}" class="badge bg-danger">EXIT</span>
						</td>
						<td th:text="${movement.quantity}"></td>
						<td th:text="${#temporals.format(movement.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(movements)}">
						<td colspan="4" class="text-center text-muted">No movements found.</td>
					</tr>
				</tbody>
			</table>
		</div>

		<a th:href="@{/stock}" class="btn btn-secondary">Back to Stock</a>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
