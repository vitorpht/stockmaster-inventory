<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
	<div th:replace="~{fragments/layout :: navbar(activePage='products')}"></div>

	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 class="mb-0">Products</h1>
			<a th:href="@{/products/new}" class="btn btn-primary">Add Product</a>
		</div>

		<div class="table-responsive">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Name</th>
						<th>Category</th>
						<th>Price</th>
						<th>Quantity</th>
						<th>Created At</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="product : ${products}">
						<td th:text="${product.id}"></td>
						<td th:text="${product.name}"></td>
						<td th:text="${product.category != null ? product.category.name : '-'}"></td>
						<td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
						<td th:text="${product.quantity}"></td>
						<td th:text="${#temporals.format(product.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(products)}">
						<td colspan="6" class="text-center text-muted">No products found.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
